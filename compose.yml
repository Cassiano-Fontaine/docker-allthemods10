services:
  atm10:
    container_name: atm10
    build:
      context: .
    ports:
      - "25565:25565"
    environment:
      EULA: "true"
      ONLINE_MODE: "false"
      # Opcional (descomente/ajuste se quiser):
      # JVM_OPTS: "-Xms2048m -Xmx4096m"
      # MAX_PLAYERS: "5"
      # ENABLE_WHITELIST: "false"
      # WHITELIST_USERS: "MasterFonta,Player2"
      # OP_USERS: "MasterFonta"
    volumes:
      - ./data:/data
    restart: unless-stopped
